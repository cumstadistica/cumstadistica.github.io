{{ $src := .Get "src" | default (.Get 0) }}

{{ $ext := lower (path.Ext $src) }}

{{ $mime := "video/mp4" }}
{{ if eq $ext ".webm" }}
  {{ $mime = "video/webm" }}
{{ else if eq $ext ".ogg" }}
  {{ $mime = "video/ogg" }}
{{ end }}

<div class="video-container">
  <video controls preload="metadata" style="width: 100%; height: auto; border-radius: 8px;">
    <source src="{{ $src | absURL }}" type="{{ $mime }}">
    Tu navegador no soporta este video. Puedes descargarlo <a href="{{ $src | absURL }}">aquí</a>.
  </video>
</div>
