version: '3'

vars:
  TASK:
    sh: command -v task || command -v go-task
  PYTHON: .venv/bin/python
  PREK: .venv/bin/prek

env:
  PREK_HOME: .venv/prek-cache

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK}} --list'

  build:
    desc: Build the Hugo site
    cmds:
      - hugo --gc --minify --cleanDestinationDir {{.CLI_ARGS}}

  serve:
    desc: Serve the site locally with drafts, future and expired content
    cmds:
      - hugo server --buildDrafts --buildFuture --buildExpired --disableFastRender {{.CLI_ARGS}}

  pagefind:
    desc: Index the generated site with Pagefind
    deps:
      - python:install
    cmds:
      - '{{.PYTHON}} -m pagefind --site public {{.CLI_ARGS}}'

  python:venv:
    desc: Create the Python virtual environment if needed
    cmds:
      - test -x {{.PYTHON}} || python3 -m venv .venv
    status:
      - test -x {{.PYTHON}}

  python:install:
    desc: Install Python dependencies into the virtual environment
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} -m pip install -r requirements.txt'
    status:
      - test -x {{.PREK}}

  check:links:
    desc: Check internal links in the generated site
    deps:
      - build
      - python:install
    cmds:
      - '{{.PYTHON}} scripts/check_links.py'

  lint:
    desc: Run fast pre-commit hooks
    deps:
      - python:install
    cmds:
      - '{{.PREK}} run --all-files --skip lychee'

  check:hooks:
    desc: Alias for lint
    cmds:
      - task: lint

  hooks:install:
    desc: Install Git hooks, including the pre-push build check
    cmds:
      - git config core.hooksPath .githooks

  check:push:
    desc: Run pre-push checks
    cmds:
      - task: build

  fix:
    desc: Run autofixing content hooks
    deps:
      - python:install
    cmds:
      - '{{.PREK}} run --all-files --skip lychee check-date-match auto-add-tags reorder-frontmatter update-raster-refs'

  check:links:external:
    desc: Check generated site links with Lychee, including external URLs
    deps:
      - python:install
    cmds:
      - timeout 10m {{.PREK}} run --all-files --stage manual hugo-build-for-lychee-full lychee-full

  check:
    desc: Build the site and check internal links
    cmds:
      - task: check:links

  verify:
    desc: Run fast hooks and local validation checks
    cmds:
      - task: lint
      - task: check

  new:
    desc: Create dated content; usage task new -- <section> <title>
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/new-content.py {{.CLI_ARGS}}'

  new:review:
    desc: Create a dated review; usage task new:review -- <title>
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/new-content.py reviews {{.CLI_ARGS}}'

  new:post:
    desc: Create a dated post in an existing category; usage task new:post -- <category> <title>
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/new-content.py --category {{.CLI_ARGS}}'

  redate:
    desc: Normalize a dated content file date from its filename
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/check-dates.py {{.CLI_ARGS}}'

  format:frontmatter:
    desc: Reorder front matter in Markdown files
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/reorder-frontmatter.py {{.CLI_ARGS}}'

  add-tags:
    desc: Auto-add matching tags to Markdown files
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/auto-add-tags.py {{.CLI_ARGS}}'

  validate:frontmatter:
    desc: Validate required front matter in Markdown files
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/validate-frontmatter.py {{.CLI_ARGS}}'

  update-raster-refs:
    desc: Update Markdown PNG/JPG refs to WebP
    deps:
      - python:venv
    cmds:
      - '{{.PYTHON}} scripts/update-raster-refs-to-webp.py {{.CLI_ARGS}}'

  images:webp:
    desc: Convert PNG/JPG images to WebP; pass files after --
    cmds:
      - scripts/image-to-webp.sh {{.CLI_ARGS}}

  update-mods:
    desc: Update git submodules
    cmds:
      - git submodule update --init --recursive --remote

  ci:build:
    desc: Build and index the site for CI
    deps:
      - python:install
    cmds:
      - hugo --gc --minify --cleanDestinationDir {{.CLI_ARGS}}
      - '{{.PYTHON}} -m pagefind --site public'

  tweet:
    desc: Publish the latest RSS post to X; pass -- --dry-run to preview
    deps:
      - python:install
    cmds:
      - '{{.PYTHON}} .github/scripts/tweet_rss.py {{.CLI_ARGS}}'

  tweet:dry-run:
    desc: Build the site and preview the tweet for the latest RSS post
    deps:
      - ci:build
    cmds:
      - '{{.PYTHON}} .github/scripts/tweet_rss.py --dry-run {{.CLI_ARGS}}'
