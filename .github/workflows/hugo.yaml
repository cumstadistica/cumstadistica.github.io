name: Build and deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "stable"
      NODE_VERSION: "22"
      TZ: Europe/Oslo
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Create directory for user-specific executable files
        run: mkdir -p "${HOME}/.local/bin"

      - name: Install latest Dart Sass
        run: |
          SASS_VERSION="$(curl -fsSL https://api.github.com/repos/sass/dart-sass/releases/latest | jq -r .tag_name)"
          SASS_VERSION="${SASS_VERSION#v}"

          curl -fsSLo dart-sass.tar.gz \
            "https://github.com/sass/dart-sass/releases/download/${SASS_VERSION}/dart-sass-${SASS_VERSION}-linux-x64.tar.gz"

          tar -C "${HOME}/.local" -xf dart-sass.tar.gz
          rm dart-sass.tar.gz

          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install latest Hugo Extended
        run: |
          HUGO_VERSION="$(curl -fsSL https://api.github.com/repos/gohugoio/hugo/releases/latest | jq -r .tag_name)"
          HUGO_VERSION="${HUGO_VERSION#v}"

          curl -fsSLo hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"

          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf hugo.tar.gz
          rm hugo.tar.gz

          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"
      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"
      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true
      - name: Configure Git
        run: |
          git config core.quotepath false
      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys:
            hugo-

      - name: Cache restore tweeted posts
        id: cache-tweeted
        uses: actions/cache/restore@v5
        with:
          path: .github/scripts/.tweeted_posts.txt
          key: tweeted-posts-${{ github.run_id }}
          restore-keys:
            tweeted-posts-

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build and index the site
        run: task ci:build -- --baseURL "${{ steps.pages.outputs.base_url }}/" --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Post update to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: task tweet

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Cache save tweeted posts
        uses: actions/cache/save@v5
        with:
          path: .github/scripts/.tweeted_posts.txt
          key: tweeted-posts-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
