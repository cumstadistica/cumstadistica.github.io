baseURL: "https://cumstadistica.github.io/"
title: "Cumstadística"
theme: "ananke"

defaultContentLanguage: "es"
locale: "es-ES"
disablePathToLower: true
enableRobotsTXT: true
sectionPagesMenu: "main"
resourceDir: "../resources"

taxonomies:
  category: "categories"
  tag: "tags"
  author: "author"

markup:
  goldmark:
    renderHooks:
      link:
        useEmbedded: always
    renderer:
      unsafe: true

pagination:
  pagerSize: 20

sitemap:
  changefreq: "monthly"
  priority: 0.5
  filename: "sitemap.xml"

outputs:
  home:
    - html
    - rss
    - json
  page:
    - html
  section:
    - html
    - rss
  taxonomy:
    - html
    - rss
  term:
    - html
    - rss

outputFormats:
  citas:
    mediaType: "application/json"
    baseName: "citas"
    isPlainText: true
    notAlternative: true

params:
  description: "El sitio web de Cumstadística"
  images:
    - "/images/CUMSTAT.webp"
  social:
    twitter: "cumstadistica"
  background_color_class: "bg-black"
  recent_posts_number: 20

  ananke:
    custom_css:
      - "css/custom.css"
    social:
      twitter:
        profile: true
        username: "cumstadistica"
      email:
        profile: true
        profilelink: "mailto:cumstadistica@gmail.com"
      rss:
        profilelink: "/index.xml"
      networks:
        twitter:
          icon: "twitter"
        email:
          icon: "envelope"
      follow:
        networks: [
          "twitter",
          "email",
          "rss"
        ]
  author:
    name: "Cumstadística"
    email: "cumstadistica.es"
