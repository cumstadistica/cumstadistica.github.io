repos:
  - repo: local
    hooks:
      - id: raster-to-webp
        name: Convert PNG/JPG to WebP
        entry: scripts/image-to-webp.sh
        language: script
        files: \.(png|jpg|jpeg|JPG|JPEG)$
        pass_filenames: true
      - id: check-date-match
        name: Sync Filename Date and Metadata
        entry: python3 scripts/check-dates.py
        language: python
        files: \.md$
        pass_filenames: true
      - id: auto-add-tags
        name: Auto-add matching tags
        entry: python3 scripts/auto-add-tags.py
        language: python
        files: ^content/.*\.md$
        pass_filenames: true
      - id: reorder-frontmatter
        name: Reorder front matter
        entry: python3 scripts/reorder-frontmatter.py
        language: python
        files: ^content/.*\.md$
        pass_filenames: true
      - id: validate-frontmatter
        name: Validate required front matter
        entry: python3 scripts/validate-frontmatter.py
        language: python
        files: ^content/.*\.md$
        pass_filenames: true
      - id: update-raster-refs
        name: Update Markdown PNG/JPG refs to WebP
        entry: python3 scripts/update-raster-refs-to-webp.py
        language: python
        files: ^content/.*\.md$
        pass_filenames: true
      - id: hugo-build-for-lychee-full
        name: Build Hugo site for Lychee
        entry: hugo --destination public --cleanDestinationDir
        language: system
        files: ^(content|layouts|static|assets|hugo\.yaml|lychee\.toml|\.pre-commit-config\.yaml)
        pass_filenames: false
        stages: [manual]

  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.24.2
    hooks:
      - id: lychee
        name: Check links with Lychee
        args:
          - --config=lychee.toml
          - --offline
          - --root-dir=public
        files: ^content/.*\.(md|html)$
      - id: lychee
        alias: lychee-full
        name: Check generated site links with Lychee
        args:
          - --config=lychee.toml
          - --root-dir=public
          - public
        files: ^(content|layouts|static|assets|hugo\.yaml|lychee\.toml|\.pre-commit-config\.yaml)
        pass_filenames: false
        stages: [manual]
